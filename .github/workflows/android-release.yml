name: Android APK

# Builds the Capacitor Android APK and, when triggered by a version tag,
# publishes it as a GitHub Release. Manual runs upload the APK as an artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Stage APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk out/neurodoom-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}.apk
          ls -la out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neurodoom-apk
          path: out/*.apk

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: NEURODOOM ${{ github.ref_name }}
          files: out/*.apk
          body: |
            NEURODOOM Android build (${{ github.ref_name }}).

            Sideload-installable **debug** APK. On your device, enable
            "Install unknown apps" for your browser/file manager, then open
            the downloaded `.apk`. Touch controls: left stick = move,
            drag right = look, FIRE / E / JMP / ☰ buttons on screen.
