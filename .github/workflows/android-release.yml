name: Android APK

# Builds the Capacitor Android APK. Triggered by a version tag, or manually
# via the Actions tab. When a version is supplied (tag push, or the `version`
# input on a manual run) the APK is published as a GitHub Release; otherwise
# it is only uploaded as a workflow artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish as a Release (e.g. v0.1.0). Leave blank to only build an artifact.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: rel
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Stage APK
        run: |
          mkdir -p out
          NAME="${{ steps.rel.outputs.tag != '' && steps.rel.outputs.tag || github.sha }}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "out/neurodoom-${NAME}.apk"
          ls -la out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neurodoom-apk
          path: out/*.apk

      - name: Publish GitHub Release
        if: steps.rel.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: NEURODOOM ${{ steps.rel.outputs.tag }}
          files: out/*.apk
          body: |
            NEURODOOM Android build (${{ steps.rel.outputs.tag }}).

            Sideload-installable **debug** APK. On your device, enable
            "Install unknown apps" for your browser/file manager, then open
            the downloaded `.apk`. Touch controls: left stick = move,
            drag right = look, FIRE / E / JMP / ☰ buttons on screen.
